name: CI

on:
  push:
    branches:
      - main
      - stg
  pull_request:
    branches:
      - main
      - stg

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'apps/api/**'
              - 'pyproject.toml'
              - 'workflows/**'
            typescript:
              - 'apps/gateway-control/**'
              - 'apps/airis-commands/**'
            shell:
              - 'scripts/airis-gateway'
              - 'scripts/quick-install.sh'
              - 'scripts/test-airis-gateway-smoke.sh'
              - 'install.sh'
              - '.tasks.d/test.yml'
              - '.github/workflows/ci.yml'

  # Python tests (only when Python files change)
  test-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          cd apps/api
          uv pip install --system -e ".[test]"

      - name: Run tests with coverage
        run: |
          cd apps/api
          python -m pytest tests/unit -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: apps/api/coverage.xml
          flags: python
          fail_ci_if_error: false

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r apps/api/src -ll -ii

  # TypeScript build and test (only when TS files change)
  build-typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [gateway-control, airis-commands]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd apps/${{ matrix.package }}
          # npm ci enforces that package-lock.json is in sync with
          # package.json so a developer who forgot to regenerate the
          # lockfile fails the build instead of silently drifting.
          npm ci

      - name: Run tests
        run: |
          cd apps/${{ matrix.package }}
          npm test

      - name: Typecheck
        run: |
          cd apps/${{ matrix.package }}
          npx tsc --noEmit

      - name: Build
        run: |
          cd apps/${{ matrix.package }}
          npm run build

  test-shell:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run airis-gateway smoke tests
        run: bash scripts/test-airis-gateway-smoke.sh

  # Open or update a pull request from stg to main so the branch protection
  # ruleset on main (which requires PRs) is satisfied. A previous version of
  # this job tried to push directly to main and was always rejected by the
  # ruleset.
  open-pr-to-main:
    needs: [test-python, build-typescript, test-shell]
    if: |
      always() &&
      github.ref == 'refs/heads/stg' &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Report stg status for promotion to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Skip if stg is already contained in main (nothing to ship).
          if git merge-base --is-ancestor origin/stg origin/main; then
            echo "stg is already merged into main; nothing to do."
            exit 0
          fi

          existing_pr=$(gh pr list \
            --base main \
            --head stg \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "${existing_pr}" ]; then
            echo "Existing PR #${existing_pr} is open for stg -> main. Commenting with the new commit."
            gh pr comment "${existing_pr}" --body \
              "New commit landed on \`stg\` (${GITHUB_SHA}). CI passed — ready for review."
            exit 0
          fi

          # No PR exists and GitHub Actions is not permitted to open one (the
          # repo policy "Allow GitHub Actions to create and approve pull
          # requests" is disabled). Report a green status with instructions so
          # the CI stays actionable without a failing job.
          cat <<EOT
          No open PR from stg to main. stg has commits that need to be promoted.
          Create the promotion PR manually with:

              gh pr create --base main --head stg \\
                --title "stg -> main: promotion" \\
                --body "Promoting stg to main."

          (GitHub Actions cannot open the PR automatically because the repo
          setting "Allow GitHub Actions to create and approve pull requests"
          is disabled. Enable it under Settings -> Actions -> General if you
          want this job to create the PR itself.)
          EOT
